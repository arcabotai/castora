# Gitleaks configuration for Castora.
# Extends the full default ruleset (so real secrets still fail CI) and only
# allowlists known false positives.

title = "castora"

[extend]
useDefault = true

[allowlist]
description = "Public on-chain values are not secrets"
# EVM contract/token/wallet addresses are public identifiers. gitleaks'
# generic-api-key rule flags them because 40 hex chars look high-entropy.
regexTarget = "line"
regexes = [
  '''0x[0-9a-fA-F]{40}''',
]
